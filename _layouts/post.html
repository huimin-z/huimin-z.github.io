---
layout: default
---

<article class="post container">
  <header class="post-header">
    <div class="post-date">{{ page.date | date: '%Y年%m月%d日' }}</div>
    <h1>{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
  
  <footer style="margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border);">
    <a href="{{ '/' | relative_url }}" style="color: var(--accent); text-decoration: none; font-weight: 500;">← 返回随笔列表</a>
  </footer>
</article>
